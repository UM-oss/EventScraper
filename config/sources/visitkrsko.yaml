source:
  id: "visitkrsko"
  name: "Visit Krsko - Mesecni napovednik"
  base_url: "https://www.visitkrsko.com"
  list_url: "https://www.visitkrsko.com/mesecni-napovednik-dogodkov"
  region: "posavje"

  pagination:
    type: "query"
    param: "page"
    start: 1
    max_pages: 1

  # Selectors guessed - tourism website
  list_selectors:
    event_card: ".event-item, .card, article"  # guessed
    title: "h3 a, h2 a, .card-title a"
    date: ".date, .event-date"
    image: "img"
    image_attr: "src"
    detail_link: "h3 a, h2 a"
    detail_link_attr: "href"

  detail_selectors:
    description: ".content, .event-description"
    location: ".location, .event-location"
    time: ".event-time"

  settings:
    delay_between_requests: 2
    timeout: 30
    encoding: "utf-8"
    user_agent: "EventScraper/1.0 (regional media aggregator)"
