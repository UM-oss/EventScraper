source:
  id: "kultura-media"
  name: "Kultura Media - Kulturni dogodki"
  base_url: "https://kultura.media.si"
  list_url: "https://kultura.media.si/kulturni-dogodki-po-sloveniji/"
  region: "slovenija"

  pagination:
    type: "query"
    param: "page"
    start: 1
    max_pages: 1

  # Selectors guessed - media/culture portal
  list_selectors:
    event_card: "article, .event-item, .post-item"  # guessed
    title: "h2 a, h3 a, .entry-title a"
    date: ".date, .entry-date, .event-date"
    image: "img, .post-thumbnail img"
    image_attr: "src"
    detail_link: "h2 a, h3 a"
    detail_link_attr: "href"

  detail_selectors:
    description: ".entry-content, .content"
    location: ".location, .event-location"
    time: ".event-time"
    categories: ".category, .event-category"

  settings:
    delay_between_requests: 2
    timeout: 30
    encoding: "utf-8"
    user_agent: "EventScraper/1.0 (regional media aggregator)"
