source:
  id: "maribor24"
  name: "Maribor24 - Dogodki"
  base_url: "https://maribor24.si"
  list_url: "https://maribor24.si/dogodki/"
  region: "maribor"

  pagination:
    type: "query"
    param: "page"
    start: 1
    max_pages: 1

  # Selectors guessed - regional news portal, likely WordPress
  list_selectors:
    event_card: "article, .event-item, .post-item"  # guessed
    title: "h2 a, h3 a, .entry-title a"
    date: ".date, .entry-date, .event-date"
    image: "img, .post-thumbnail img"
    image_attr: "src"
    detail_link: "h2 a, h3 a"
    detail_link_attr: "href"

  detail_selectors:
    description: ".entry-content, .event-content"
    location: ".location, .event-location"
    time: ".event-time"

  settings:
    delay_between_requests: 2
    timeout: 30
    encoding: "utf-8"
    user_agent: "EventScraper/1.0 (regional media aggregator)"
