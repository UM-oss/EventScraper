source:
  id: "stuk"
  name: "STUK - Vstopnice"
  base_url: "https://vstopnice.stuk.org"
  list_url: "https://vstopnice.stuk.org/"
  region: "maribor"

  pagination:
    type: "query"
    param: "page"
    start: 1
    max_pages: 1

  # Selectors guessed - ticketing platform
  list_selectors:
    event_card: ".event-item, .event-card, article"  # guessed
    title: "h2 a, h3 a, .event-title a"
    date: ".date, .event-date"
    image: "img"
    image_attr: "src"
    detail_link: "h2 a, h3 a, .event-title a"
    detail_link_attr: "href"

  detail_selectors:
    description: ".event-description, .content"
    location: ".event-location, .venue"
    time: ".event-time"
    price: ".price, .event-price"

  settings:
    delay_between_requests: 2
    timeout: 30
    encoding: "utf-8"
    user_agent: "EventScraper/1.0 (regional media aggregator)"
