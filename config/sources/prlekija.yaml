source:
  id: "prlekija"
  name: "Prlekija-on.net (dogodki)"
  base_url: "https://www.prlekija-on.net"
  list_url: "https://www.prlekija-on.net/dogodki"
  region: "pomurska"

  # Custom parser — bere SAMO iz /dogodki listing strani.
  # NE iz splošnega RSS-a (ki vključuje novice).
  parser_type: "prlekija"

  pagination:
    type: "query"
    param: "page"
    start: 1
    max_pages: 1

  list_selectors: {}
  detail_selectors: {}

  settings:
    delay_between_requests: 1
    timeout: 20
    encoding: "utf-8"
    user_agent: "Mozilla/5.0 (compatible; EventScraper/1.0)"
