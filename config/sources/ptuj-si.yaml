source:
  id: "ptuj-si"
  name: "Mestna obcina Ptuj - Objave"
  base_url: "https://www.ptuj.si"
  list_url: "https://www.ptuj.si/objave/43"
  region: "ptuj"

  pagination:
    type: "query"
    param: "page"
    start: 1
    max_pages: 1

  # Selectors guessed - municipal website
  list_selectors:
    event_card: ".news-item, .objava, article, .views-row"  # guessed
    title: "h3 a, h2 a, .title a"
    date: ".date, .news-date"
    image: "img"
    image_attr: "src"
    detail_link: "h3 a, h2 a"
    detail_link_attr: "href"

  detail_selectors:
    description: ".content, .news-content, .body"
    location: ".location"

  settings:
    delay_between_requests: 2
    timeout: 30
    encoding: "utf-8"
    user_agent: "EventScraper/1.0 (regional media aggregator)"
