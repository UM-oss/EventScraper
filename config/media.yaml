# Mediji - 7 portalov za objavo dogodkov
# Viri se scrapajo CENTRALIZIRANO (vsi po celi Sloveniji),
# nato se dogodki pametno razvrščajo na portale glede na:
#   - regionalno relevantnost
#   - tematsko zanimivost
#   - ciljno publiko
#   - ravnotežje med organizatorji in temami
# Dogodek se lahko objavi na VEČ portalih hkrati.

media:
  - id: "sobotainfo"
    name: "SobotaInfo"
    url: "https://sobotainfo.com"
    primary_regions:
      - "pomurska"
      - "pomurje"
      - "murska-sobota"
      - "lendava"
    secondary_regions: []

  - id: "pomurec"
    name: "Pomurec.com"
    url: "https://pomurec.com"
    primary_regions:
      - "pomurska"
      - "pomurje"
      - "prlekija"
    secondary_regions:
      - "podravska"

  - id: "mariborinfo"
    name: "MariborInfo"
    url: "https://mariborinfo.com"
    primary_regions:
      - "maribor"
      - "podravska"
    secondary_regions: []

  - id: "ptujinfo"
    name: "PtujInfo"
    url: "https://ptujinfo.com"
    primary_regions:
      - "ptuj"
      - "ormoz"
    secondary_regions:
      - "podravska"

  - id: "ljubljanainfo"
    name: "LjubljanaInfo"
    url: "https://ljubljanainfo.com"
    primary_regions:
      - "ljubljana"
      - "osrednjeslovenska"
      - "mol"
    secondary_regions: []

  - id: "gorenjskainfo"
    name: "GorenjskaInfo"
    url: "https://gorenjskainfo.com"
    primary_regions:
      - "gorenjska"
    secondary_regions: []

  - id: "dolenjskainfo"
    name: "DolenjskaInfo"
    url: "https://dolenjskainfo.com"
    primary_regions:
      - "dolenjska"
      - "jugovzhodna"
      - "posavje"
    secondary_regions: []

  - id: "slovenija"
    name: "Slovenija"
    url: ""
    primary_regions:
      - "slovenija"
      - "savinjska"
      - "zasavska"
      - "primorska"
      - "goriska"
      - "koroska"
      - "notranjska"
    secondary_regions: []

