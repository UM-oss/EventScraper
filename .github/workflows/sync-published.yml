name: Sync Published Events

# Sinhronizira že-objavljene dogodke iz *info portalov v Render bazo.
# GitHub Actions IPs (Microsoft Azure) niso blokirani s strani Cloudflare,
# za razliko od Render outbound IP-jev.
#
# Schedule: vsak dan ob 6:30 CEST (= 04:30 UTC poleti) — po dnevnem scrape-u
# Tudi ročna sprožitev (workflow_dispatch).

on:
  schedule:
    - cron: "30 4 * * *"   # 06:30 CEST poleti, 05:30 CET pozimi
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync published events
        env:
          EVENT_SCRAPER_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GH_LOG_LEVEL: INFO
        run: python scripts/sync_published.py
