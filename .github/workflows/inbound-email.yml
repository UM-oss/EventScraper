name: Inbound Email Sync

# Vsakih 15 minut preveri inbox za nove dogodke poslane preko emaila.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Process inbox
        env:
          EVENT_SCRAPER_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INBOUND_IMAP_HOST: ${{ secrets.INBOUND_IMAP_HOST }}
          INBOUND_IMAP_USER: ${{ secrets.INBOUND_IMAP_USER }}
          INBOUND_IMAP_PASSWORD: ${{ secrets.INBOUND_IMAP_PASSWORD }}
          INBOUND_IMAP_FOLDER: ${{ secrets.INBOUND_IMAP_FOLDER }}
          INBOUND_DEFAULT_MEDIA: ${{ secrets.INBOUND_DEFAULT_MEDIA }}
          LOG_LEVEL: INFO
        run: python scripts/inbound_email.py
