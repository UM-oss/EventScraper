# Render.com Blueprint za Event Scraper
# Ref: https://render.com/docs/blueprint-spec

databases:
  - name: event-scraper-db
    plan: free
    databaseName: event_scraper
    user: event_scraper
    region: frankfurt

services:
  - type: web
    name: event-scraper-web
    runtime: python
    plan: free
    region: frankfurt
    branch: main
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: alembic upgrade head && python scripts/bootstrap_admin.py && gunicorn -w 2 -b 0.0.0.0:$PORT --timeout 300 --access-logfile - web.app:app
    healthCheckPath: /login
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: EVENT_SCRAPER_DATABASE_URL
        fromDatabase:
          name: event-scraper-db
          property: connectionString
      - key: EVENT_SCRAPER_SCHEDULER
        value: "0"
      - key: EVENT_SCRAPER_VALIDATE
        value: "1"
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_JSON
        value: "1"
      - key: FLASK_DEBUG
        value: "0"
      - key: SESSION_SECURE
        value: "1"
      - key: EVENT_SCRAPER_SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: GEMINI_API_KEY
        sync: false
