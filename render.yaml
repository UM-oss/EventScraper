# Render.com Blueprint za Event Scraper
# Dokumentacija: https://render.com/docs/blueprint-spec
#
# Zaženi:
#   1. Git repo dodaj v Render (https://dashboard.render.com/blueprints)
#   2. Render bo prebral ta fajl in zgradil:
#      - PostgreSQL bazo (free 90 dni, nato ~$7/mes)
#      - Web service za Flask dashboard
#      - Cron job za dnevno scrapanje ob 6:00 (Starter $7/mes)
#   3. Po deployu odpri /uporabniki in dodaj uporabnika

databases:
  - name: event-scraper-db
    plan: free
    databaseName: event_scraper
    user: event_scraper
    postgresMajorVersion: "16"
    region: frankfurt   # najbližja Sloveniji

services:
  # ============================================================
  # WEB DASHBOARD
  # ============================================================
  - type: web
    name: event-scraper-web
    runtime: python
    plan: free   # 750h/mes, sleeps po 15 min idle. Za production: starter ($7/mes)
    region: frankfurt
    pythonVersion: "3.11"
    branch: main

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    # Migracije + bootstrap medijev + sync admin user + zagon gunicorn
    startCommand: |
      alembic upgrade head &&
      python scripts/bootstrap_admin.py &&
      gunicorn -w 2 -b 0.0.0.0:$PORT --timeout 300 --access-logfile - web.app:app

    healthCheckPath: /login

    envVars:
      - key: EVENT_SCRAPER_DATABASE_URL
        fromDatabase:
          name: event-scraper-db
          property: connectionString

      # Disabled scheduler v web service-u — uporabljamo Render Cron
      - key: EVENT_SCRAPER_SCHEDULER
        value: "0"

      - key: EVENT_SCRAPER_VALIDATE
        value: "1"

      - key: LOG_LEVEL
        value: INFO
      - key: LOG_JSON
        value: "1"

      - key: FLASK_DEBUG
        value: "0"
      - key: SESSION_SECURE
        value: "1"

      # Auto-generiran ob prvem deployu, persistira med deploy-i
      - key: EVENT_SCRAPER_SECRET_KEY
        generateValue: true

      # Te NASTAVI ROČNO v Render dashboardu:
      - key: ADMIN_EMAIL
        sync: false   # ti vneseš v Render UI
      - key: ADMIN_PASSWORD
        sync: false   # ti vneseš v Render UI (geslo za prvi login)
      - key: ADMIN_NAME
        sync: false

      - key: GEMINI_API_KEY
        sync: false   # opcijsko, za AI generiranje opisov

  # ============================================================
  # DAILY SCRAPE (cron job ob 6:00 CET)
  # ============================================================
  # Cron jobs so plačljivi (~$7/mes). Če ne želiš, izklopi in
  # uporabi alternativo (GitHub Actions free 2000 min/mes).
  - type: cron
    name: event-scraper-daily
    runtime: python
    plan: starter   # cron jobs nimajo free tier-a
    region: frankfurt
    pythonVersion: "3.11"
    branch: main
    schedule: "0 5 * * *"   # 06:00 CEST (= 05:00 UTC) vsak dan

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: |
      python scripts/daily_scrape.py

    envVars:
      - key: EVENT_SCRAPER_DATABASE_URL
        fromDatabase:
          name: event-scraper-db
          property: connectionString
      - key: EVENT_SCRAPER_VALIDATE
        value: "0"
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_JSON
        value: "1"
      - key: GEMINI_API_KEY
        sync: false
